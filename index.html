<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>AI Pre-Launch Prediction Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.64.2/build/stlite.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.64.2/build/stlite.js"></script>
  <script>
    stlite.mount({
      // Tell WebAssembly which core packages to install in the browser sandbox
      requirements: ["pandas", "scikit-learn", "joblib"],
      entrypoint: "app.py",
      files: {
        // Automatically fetch your local Python script
        "app.py": {
          url: "./app.py"
        },
        // Automatically fetch your trained machine learning model
        "model.pkl": {
          url: "./model.pkl"
        }
      }
    }, document.getElementById("root"));
  </script>
</body>
</html>
